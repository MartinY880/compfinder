services:
  db:
    image: postgres:16-alpine
    container_name: comp-finder-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-compfinder}
      POSTGRES_USER: ${POSTGRES_USER:-compfinder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - comp_finder_pgdata_dev:/var/lib/postgresql/data

  comp-finder-dev:
    build: .
    container_name: comp-finder-dev
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8502:8501"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-compfinder}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-compfinder}
    volumes:
      - ./certs:/app/certs:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  comp_finder_pgdata_dev:
